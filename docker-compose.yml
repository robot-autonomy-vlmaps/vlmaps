services:
  vlmaps:
    # Use pre-built image from GitHub Container Registry (faster)
    # Set VLMAPS_IMAGE env var to override, or set VLMAPS_BUILD_LOCAL=true to build locally
    # Default: ghcr.io/robot-autonomy-vlmaps/vlmaps:latest
    image: ${VLMAPS_IMAGE:-ghcr.io/robot-autonomy-vlmaps/vlmaps:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vlmaps-dev
    
    # Volume mounts
    volumes:
      # Mount project files (current directory) to /vlmaps in container
      - .:/vlmaps:cached
      # Preserve bash history
      - vlmaps-bash-history:/root/.bash_history
      # GUI support (X11 forwarding)
      # /tmp/.X11-unix is the X11 socket directory (usually accessible to all users)
      - /tmp/.X11-unix:/tmp/.X11-unix
      # XAUTHORITY file contains X11 authentication cookie
      # Mount to a writable location in container, use XAUTHORITY env var to point to it
      - ${HOME}/.Xauthority:/tmp/.Xauthority:ro
    
    # Environment variables
    environment:
      # GUI support
      - DISPLAY=${DISPLAY:-:0}
      # Point XAUTHORITY to the mounted file (if available)
      - XAUTHORITY=/tmp/.Xauthority
      # Use NVIDIA GPU for rendering (CUDA 12.4)
      - __NV_PRIME_RENDER_OFFLOAD=1
      - __GLX_VENDOR_LIBRARY_NAME=nvidia
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,display
      - NVIDIA_VISIBLE_DEVICES=all
      - DEBIAN_FRONTEND=noninteractive
      - TERM=${TERM:-xterm-256color}
    
    # GPU support (CUDA 12.4)
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    
    # Network and IPC settings for X11
    network_mode: host
    ipc: host
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Default command (interactive bash with conda environment)
    command: /bin/bash -c "source /opt/conda/etc/profile.d/conda.sh && conda activate vlmaps && exec /bin/bash"

volumes:
  vlmaps-bash-history:

