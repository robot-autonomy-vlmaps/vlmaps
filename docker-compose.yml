services:
  vlmaps:
    # Use pre-built image from GitHub Container Registry (faster)
    # Set VLMAPS_IMAGE env var to override, or set VLMAPS_BUILD_LOCAL=true to build locally
    # Default: ghcr.io/robot-autonomy-vlmaps/vlmaps:latest
    image: ${VLMAPS_IMAGE:-ghcr.io/robot-autonomy-vlmaps/vlmaps:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vlmaps-dev
    
    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    # Volume mounts
    volumes:
      # Mount project files (current directory) to /vlmaps in container (includes ./data)
      - .:/vlmaps
      # Preserve bash history
      - vlmaps-bash-history:/root/.bash_history
      # X11 forwarding
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
    
    # Environment variables
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DEBIAN_FRONTEND=noninteractive
      - TERM=${TERM:-xterm-256color}
      # Headless-friendly defaults
      - PYOPENGL_PLATFORM=egl
      - O3D_RENDERING_ENABLE_HEADLESS=1
      - MPLBACKEND=Agg
      - QT_QPA_PLATFORM=offscreen
    
    # Network and IPC settings for X11
    network_mode: host
    ipc: host
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Default command (interactive bash with conda environment)
    command: /bin/bash -c "source /opt/conda/etc/profile.d/conda.sh && conda activate vlmaps && exec /bin/bash"

volumes:
  vlmaps-bash-history:

